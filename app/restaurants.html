<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Restaurants — Fork &amp; Flame</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="css/shared.css"/>
  <style>
    .page-hero{min-height:280px;position:relative;overflow:hidden;display:flex;align-items:flex-end;padding-top:60px;}
    .page-hero-bg{position:absolute;inset:0;background:url('https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=1400&q=80') center/cover;}
    .page-hero-ov{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(14,12,9,.35) 0%,rgba(14,12,9,.88) 100%);}
    .page-hero-content{position:relative;z-index:1;padding:3rem 0 2rem;}
    .sec-eye{font-size:.69rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--amber);display:inline-flex;align-items:center;gap:.6rem;}
    .sec-eye::before{content:'';width:22px;height:1px;background:var(--amber);}
    .sec-title{font-family:var(--font-d);font-size:clamp(1.8rem,3.5vw,2.5rem);font-weight:600;color:var(--cream);line-height:1.1;}
    .sec-title em{font-style:italic;color:var(--amber-light);}

    /* SEARCH BAR */
    .search-wrap{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:.8rem 1rem;margin-bottom:2rem;}
    .search-wrap .ff-input{flex:1;min-width:200px;padding:.45rem .9rem;font-size:.85rem;background:var(--card);}
    .search-wrap .ff-select{width:auto;padding:.45rem 2rem .45rem .85rem;font-size:.82rem;background:var(--card);}

    /* CARD */
    .r-card{border-radius:var(--r-md);overflow:hidden;background:var(--card);border:1px solid var(--border);transition:all .3s;height:100%;display:flex;flex-direction:column;}
    .r-card:hover{transform:translateY(-5px);box-shadow:0 16px 50px rgba(0,0,0,.5),0 0 28px rgba(212,134,58,.1);border-color:rgba(212,134,58,.2);}
    .r-card .img-wrap{position:relative;height:200px;overflow:hidden;}
    .r-card .img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .5s;}
    .r-card:hover .img-wrap img{transform:scale(1.06);}
    .r-card .body{padding:1.15rem;flex:1;display:flex;flex-direction:column;}
    .r-card .rname{font-family:var(--font-d);font-size:1.08rem;color:var(--cream);margin-bottom:.25rem;}
    .r-card .rmeta{display:flex;align-items:center;gap:.42rem;font-size:.74rem;color:var(--muted);flex-wrap:wrap;margin-bottom:.5rem;}
    .r-card .dot{width:3px;height:3px;border-radius:50%;background:var(--border);}
    .r-card .rdesc{font-size:.8rem;color:var(--muted);line-height:1.55;flex:1;margin-bottom:.85rem;}
    .r-card .rfoot{display:flex;justify-content:space-between;align-items:center;padding-top:.75rem;border-top:1px solid var(--border);}
    .no-results{text-align:center;padding:4rem 2rem;color:var(--muted);}
    .no-results .icon{font-size:2.5rem;margin-bottom:.8rem;opacity:.4;}
  </style>
</head>
<body>
<div id="loader"><div class="ld-brand">Fork &amp; Flame</div><div class="ld-bar"><div class="ld-fill"></div></div></div>

<nav class="nav">
  <div class="wrap">
    <a href="index.html" class="nav-brand">Fork &amp; Flame<span>Fine Dining Reviews</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="restaurants.html" class="active">Restaurants</a></li>
      <li><a href="reviews.html">Reviews</a></li>
    </ul>
    <div class="nav-right" id="navRight">
      <a href="login.html" class="btn btn-ghost btn-sm">Log In</a>
      <a href="signup.html" class="btn btn-amber btn-sm">Sign Up</a>
    </div>
  </div>
</nav>

<div class="page-hero">
  <div class="page-hero-bg"></div>
  <div class="page-hero-ov"></div>
  <div class="wrap page-hero-content">
    <div class="sec-eye mb-2 reveal">Browse &amp; Discover</div>
    <h1 class="sec-title reveal d1">Find Your Next <em>Favourite</em> Table</h1>
  </div>
</div>

<section style="padding:3rem 0 5rem;">
  <div class="wrap">
    <div class="search-wrap">
      <i class="fas fa-search" style="color:var(--muted);font-size:.85rem;flex-shrink:0;"></i>
      <input class="ff-input" type="text" id="searchInput" placeholder="Search restaurant or cuisine…" oninput="renderCards()"/>
      <select class="ff-select" id="filterCuisine" onchange="renderCards()">
        <option value="all">All Cuisines</option>
        <option value="Steakhouse">Steakhouse</option>
        <option value="Indian">Indian</option>
        <option value="Japanese">Japanese</option>
        <option value="Italian">Italian</option>
        <option value="American">American</option>
        <option value="Seafood">Seafood</option>
      </select>
      <select class="ff-select" id="filterPrice" onchange="renderCards()">
        <option value="all">All Prices</option>
        <option value="$$">$$ Budget</option>
        <option value="$$$">$$$ Mid-range</option>
        <option value="$$$$">$$$$ Fine Dining</option>
      </select>
    </div>
    <div class="row g-4" id="cardGrid"></div>
    <div id="noResults" class="no-results" style="display:none;"><div class="icon">🔍</div><p>No restaurants match your search.</p></div>
  </div>
</section>

<footer class="footer">
  <div class="wrap">
    <div class="footer-bottom" style="border-top:1px solid var(--border);padding-top:1.2rem;">
      <span>© 2026 Fork &amp; Flame</span><a href="index.html">← Back to Home</a>
    </div>
  </div>
</footer>

<script src="js/app.js"></script>
<script>
  const user = Session.load();
  if(user) document.getElementById('navRight').innerHTML=`<a href="${user.role==='customer'?'customer-dashboard.html':'owner-dashboard.html'}" class="btn btn-amber btn-sm">Dashboard</a>`;

  function renderCards(){
    const search  = document.getElementById('searchInput').value.toLowerCase();
    const cuisine = document.getElementById('filterCuisine').value;
    const price   = document.getElementById('filterPrice').value;

    const imgs = {
      r1:'https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=600&q=80',
      r2:'https://images.unsplash.com/photo-1511690656952-34342bb7c2f2?w=600&q=80',
      r3:'https://images.unsplash.com/photo-1557872943-16a5ac26437e?w=600&q=80',
      r4:'https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=600&q=80',
      r5:'https://images.unsplash.com/photo-1550547660-d9450f859349?w=600&q=80',
      r6:'https://images.unsplash.com/photo-1559339352-11d035aa65de?w=600&q=80',
    };
    const descs = {
      r1:'Wood-fired excellence. Every cut tells a story of fire and patience.',
      r2:'Three-generation recipes with spices flown weekly from Kerala.',
      r3:'72-hour tonkotsu broth — the best ramen outside Japan.',
      r4:'Authentic Neapolitan pies baked in a 900°F wood-fired oven.',
      r5:'Craft burgers with locally sourced beef. Truffle fries are legendary.',
      r6:'Daily catch from local harbours. Pristine, minimalist preparations.',
    };

    let filtered = DUMMY.restaurants.filter(r => {
      const matchS = !search || r.name.toLowerCase().includes(search)||r.cuisine.toLowerCase().includes(search);
      const matchC = cuisine==='all'||r.cuisine===cuisine;
      const matchP = price==='all'||r.price===price;
      return matchS&&matchC&&matchP;
    });

    const grid = document.getElementById('cardGrid');
    const noR  = document.getElementById('noResults');
    if(!filtered.length){grid.innerHTML='';noR.style.display='';return;}
    noR.style.display='none';
    grid.innerHTML = filtered.map(r => `
      <div class="col-lg-4 col-md-6">
        <div class="r-card">
          <div class="img-wrap">
            <img src="${imgs[r.id]||imgs.r1}" alt="${r.name}"/>
            <span class="badge badge-amber" style="position:absolute;top:.7rem;left:.7rem;">${r.cuisine}</span>
          </div>
          <div class="body">
            <div class="rname">${r.name}</div>
            <div class="rmeta">
              <span class="stars">${'★'.repeat(Math.floor(r.rating))}<span class="dim">${'★'.repeat(5-Math.floor(r.rating))}</span></span>
              <span class="dot"></span><span>${r.rating} · ${r.reviews} reviews</span>
              <span class="dot"></span><span>${r.price}</span>
            </div>
            <p class="rdesc">${descs[r.id]||''}</p>
            <div class="rfoot">
              <span style="font-size:.75rem;color:var(--muted);">${r.city}</span>
              <a href="login.html" class="btn btn-amber btn-sm">View &amp; Review</a>
            </div>
          </div>
        </div>
      </div>
    `).join('');
  }
  renderCards();
</script>
</body>
</html>
