<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/login.css') }}"
    />
  </head>

  <body>
    <nav class="navbar navbar-dark bg-dark" style="width: 100%; position: fixed; top: 0; left: 0; z-index: 10">
      <div class="container">
        <a class="navbar-brand fw-bold" href="/home">FoodHub</a>
      </div>
    </nav>

    <div class="auth-box">
      <h2>Login</h2>

      <form>
        <div class="mb-3">
          <label class="form-label">Select Role</label>
          <select name="role" class="form-select mb-2">
            <option value="user">User</option>
            <option value="restaurant owner">Restaurant Owner</option>
          </select>
        </div>

        <input
          type="email"
          class="form-control mb-2"
          placeholder="Email"
          required
        />
        <input
          type="password"
          class="form-control mb-2"
          placeholder="Password"
          required
        />

        <button type="submit" class="custom-btn w-100 py-2 rounded-pill">
          Login
        </button>
      </form>

      <div class="mt-3 small text-muted">
        Demo shortcuts:
        <a href="/cusProfile" class="ms-1">Customer Profile</a>
        ·
        <a href="/restaurantProfile">Restaurant Owner</a>
      </div>

      <div class="link">
        <p>Don't have an account? <a href="/signup">Sign Up</a></p>
      </div>
    </div>
  </body>
</html>
