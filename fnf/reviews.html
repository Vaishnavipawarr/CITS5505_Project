<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Reviews — Fork &amp; Flame</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="css/shared.css"/>
  <style>
    .page-hero{min-height:260px;position:relative;overflow:hidden;display:flex;align-items:flex-end;padding-top:60px;}
    .page-hero-bg{position:absolute;inset:0;background:url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=1400&q=80') center/cover;}
    .page-hero-ov{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(14,12,9,.35) 0%,rgba(14,12,9,.88) 100%);}
    .page-hero-content{position:relative;z-index:1;padding:3rem 0 2rem;}
    .sec-eye{font-size:.69rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--amber);display:inline-flex;align-items:center;gap:.6rem;}
    .sec-eye::before{content:'';width:22px;height:1px;background:var(--amber);}
    .sec-title{font-family:var(--font-d);font-size:clamp(1.8rem,3.5vw,2.5rem);font-weight:600;color:var(--cream);}
    .sec-title em{font-style:italic;color:var(--amber-light);}

    .fbar{display:flex;gap:.6rem;align-items:center;flex-wrap:wrap;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:.8rem 1rem;margin-bottom:2rem;}
    .fbar .ff-input{flex:1;min-width:180px;padding:.45rem .9rem;font-size:.83rem;background:var(--card);}
    .fbar .ff-select{width:auto;padding:.45rem 2rem .45rem .85rem;font-size:.81rem;background:var(--card);}

    .rev-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-md);padding:1.4rem;margin-bottom:1rem;transition:all .28s;}
    .rev-card:hover{border-color:rgba(212,134,58,.18);transform:translateY(-2px);box-shadow:0 6px 26px rgba(0,0,0,.3);}
    .reviewer-av{width:42px;height:42px;border-radius:50%;object-fit:cover;border:2px solid var(--border);}
    .rev-rest-tag{display:inline-flex;align-items:center;gap:.5rem;background:var(--surface);border-radius:var(--r-sm);padding:.28rem .7rem;margin-bottom:.85rem;font-size:.77rem;color:var(--text);}
    .rev-rest-tag img{width:20px;height:20px;border-radius:4px;object-fit:cover;}
    .rev-body{font-size:.86rem;line-height:1.72;color:var(--text);margin-bottom:.85rem;}
    .rev-chip{background:rgba(212,134,58,.1);border:1px solid rgba(212,134,58,.18);color:var(--amber-light);border-radius:20px;padding:.17rem .6rem;font-size:.69rem;display:inline-block;margin:0 .2rem .2rem 0;}
    .owner-reply{background:rgba(212,134,58,.05);border-left:3px solid var(--amber);border-radius:0 var(--r-sm) var(--r-sm) 0;padding:.82rem 1rem;margin-top:.9rem;}
    .owner-reply .lbl{font-size:.67rem;letter-spacing:.1em;text-transform:uppercase;color:var(--amber);font-weight:600;margin-bottom:.25rem;}
    .owner-reply p{font-size:.83rem;color:var(--muted);line-height:1.65;}

    .cta-band{background:linear-gradient(135deg,var(--card) 0%,var(--surface) 100%);border:1px solid rgba(212,134,58,.18);border-radius:var(--r-md);padding:2rem 2.5rem;display:flex;align-items:center;justify-content:space-between;gap:1.5rem;margin-bottom:2rem;flex-wrap:wrap;}
    .cta-band h3{font-family:var(--font-d);font-size:1.35rem;color:var(--cream);margin-bottom:.25rem;}
    .cta-band p{font-size:.84rem;color:var(--muted);margin:0;}
  </style>
</head>
<body>
<div id="loader"><div class="ld-brand">Fork &amp; Flame</div><div class="ld-bar"><div class="ld-fill"></div></div></div>

<nav class="nav">
  <div class="wrap">
    <a href="index.html" class="nav-brand">Fork &amp; Flame<span>Fine Dining Reviews</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="restaurants.html">Restaurants</a></li>
      <li><a href="reviews.html" class="active">Reviews</a></li>
    </ul>
    <div class="nav-right" id="navRight">
      <a href="login.html" class="btn btn-ghost btn-sm">Log In</a>
      <a href="signup.html" class="btn btn-amber btn-sm">Sign Up</a>
    </div>
  </div>
</nav>

<div class="page-hero">
  <div class="page-hero-bg"></div>
  <div class="page-hero-ov"></div>
  <div class="wrap page-hero-content">
    <div class="sec-eye mb-2 reveal">Community Reviews</div>
    <h1 class="sec-title reveal d1">Honest Reviews from <em>Real Food Lovers</em></h1>
  </div>
</div>

<section style="padding:3rem 0 5rem;">
  <div class="wrap" style="max-width:820px;">

    <div class="cta-band">
      <div>
        <h3>Share Your Dining Story</h3>
        <p>Your review helps others find their next favourite restaurant.</p>
      </div>
      <a href="login.html" class="btn btn-amber"><i class="fas fa-pen-nib"></i> Write a Review</a>
    </div>

    <div class="fbar">
      <i class="fas fa-search" style="color:var(--muted);font-size:.82rem;flex-shrink:0;"></i>
      <input class="ff-input" type="text" id="searchInput" placeholder="Search by restaurant or reviewer…" oninput="renderRevs()"/>
      <select class="ff-select" id="filterRating" onchange="renderRevs()">
        <option value="all">All Ratings</option>
        <option value="5">5 Stars</option>
        <option value="4">4+ Stars</option>
        <option value="3">3+ Stars</option>
      </select>
      <select class="ff-select" id="filterRest" onchange="renderRevs()">
        <option value="all">All Restaurants</option>
      </select>
    </div>

    <div id="revList"></div>
  </div>
</section>

<footer class="footer">
  <div class="wrap">
    <div class="footer-bottom" style="border-top:1px solid var(--border);padding-top:1.2rem;">
      <span>© 2026 Fork &amp; Flame</span><a href="index.html">← Back to Home</a>
    </div>
  </div>
</footer>

<script src="js/app.js"></script>
<script>
  const user = Session.load();
  if(user) document.getElementById('navRight').innerHTML=`<a href="${user.role==='customer'?'customer-dashboard.html':'owner-dashboard.html'}" class="btn btn-amber btn-sm">Dashboard</a>`;

  // Populate rest filter
  const fr = document.getElementById('filterRest');
  DUMMY.restaurants.forEach(r => fr.innerHTML+=`<option value="${r.id}">${r.name}</option>`);

  function renderRevs(){
    const search   = document.getElementById('searchInput').value.toLowerCase();
    const rFilter  = document.getElementById('filterRating').value;
    const restFilt = document.getElementById('filterRest').value;
    let reviews = getReviews();
    if(search)        reviews = reviews.filter(r=>r.customerName.toLowerCase().includes(search)||r.restaurantName.toLowerCase().includes(search)||r.text.toLowerCase().includes(search));
    if(rFilter!=='all') reviews = reviews.filter(r => r.rating >= parseInt(rFilter));
    if(restFilt!=='all') reviews = reviews.filter(r => r.restaurantId===restFilt);

    const el = document.getElementById('revList');
    if(!reviews.length){el.innerHTML=`<div style="text-align:center;padding:3rem;color:var(--muted)"><i class="fas fa-search" style="font-size:2rem;margin-bottom:.8rem;opacity:.4;display:block;"></i>No reviews match your search.</div>`;return;}
    el.innerHTML = reviews.map(r=>`
      <div class="rev-card">
        <div class="d-flex align-items-center gap-3 mb-3">
          <img class="reviewer-av" src="${r.customerAvatar}" alt=""/>
          <div class="flex-1">
            <div style="font-weight:600;font-size:.9rem;color:var(--cream)">${r.customerName}</div>
            <div style="font-size:.72rem;color:var(--muted)">${r.date}</div>
          </div>
          <div class="ms-auto"><span class="stars">${'★'.repeat(r.rating)}<span class="dim">${'★'.repeat(5-r.rating)}</span></span></div>
        </div>
        <div class="rev-rest-tag">
          <img src="${r.restaurantImg}" alt=""/>
          ${r.restaurantName}
        </div>
        <p class="rev-body">${r.text}</p>
        ${(r.tags||[]).length?`<div style="margin-bottom:.8rem">${r.tags.map(t=>`<span class="rev-chip">${t}</span>`).join('')}</div>`:''}
        ${r.ownerReply?`<div class="owner-reply"><div class="lbl">✦ Owner's Reply</div><p>${r.ownerReply}</p></div>`:''}
      </div>
    `).join('');
  }
  renderRevs();
</script>
</body>
</html>
