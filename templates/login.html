<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    # Bootstrap
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f6fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .auth-box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .link {
            text-align: center;
            margin-top: 10px;
        }

        .link a {
            text-decoration: none;
            color: #007BFF;
        }
    </style>
</head>

<body>

<div class="auth-box">
    <h2>Login</h2>

    <form>
        <input type="email" class="form-control mb-2" placeholder="Email" required>
        <input type="password" class="form-control mb-2" placeholder="Password" required>

        <button type="submit" class="btn btn-primary w-100 py-2 rounded-pill">
            Login
        </button>
    </form>

    <div class="link">
        <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
    </div>
</div>

</body>
</html>
