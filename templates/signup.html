<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>

    <!-- boostrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #8d6e63;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .auth-box {
            background: #fffaf5;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #4e342e;
        }

        .link {
            text-align: center;
            margin-top: 10px;
        }

        .link a {
            text-decoration: none;
            color: #007BFF;
        }

        .custom-btn {
            background-color: #d2691e;
            color: white;
            border: none;
        }

        .custom-btn:hover {
            background-color: #a0522d;
        }
    </style>
</head>

<body>

<div class="auth-box">
    <h2>Sign Up</h2>

    <form>
        <!-- role -->
        <div class="mb-3">
            <label class="form-label">Select Role</label>
            <select name="role" class="form-select mb-2">
                <option value="user">User</option>
                <option value="admin">Admin</option>
            </select>
        </div>

        <input type="text" class="form-control mb-2" placeholder="Username" required>
        <input type="email" class="form-control mb-2" placeholder="Email" required>
        <input type="password" class="form-control mb-2" placeholder="Password" required>
        <input type="password" class="form-control mb-2" placeholder="Confirm Password" required>

        <button type="submit" class=" custom-btn w-100 py-2 rounded-pill ">
            Sign Up
        </button>
    </form>

    <div class="link">
        <p>Already have an account? <a href="login.html">Login</a></p>
    </div>
</div>

</body>
</html>
